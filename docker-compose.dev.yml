services:

  db: 
    image: postgres:17
    env_file:
    - path: .env.development
      required: true
    - path: .env.development.local
      required: false
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - unlockit_network
  
  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5003:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db
    networks:
      - unlockit_network

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile.dev
    restart: unless-stopped
    ports:
      - "5001:3000"
    env_file:
      - path: .env.development
        required: true
      - path: .env.development.local
        required: false
    environment:
      NODE_ENV: development
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      SSL_DIR_PATH: /srv/cert
    volumes:
      - ./apps/backend:/srv/apps/backend:cached,z
      - ./infrastructure/cert:/srv/cert:ro,z
      - /srv/node_modules
    depends_on:
      - db
    networks:
      - unlockit_network

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile.dev
    restart: unless-stopped
    ports:
      - "5000:5173"
    env_file:
      - path: .env.development
        required: true
      - path: .env.development.local
        required: false
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: backend:3000
    volumes:
      - ./apps/frontend:/srv/apps/frontend:cached,z
      - /srv/node_modules

      #- ./dev.key:/srv/dev.key:ro,z
      #- ./dev.crt:/srv/dev.crt:ro,z
    depends_on:
      - backend
    networks:
      - unlockit_network

volumes:
  db_data:
  pgadmin_data:

networks:
  unlockit_network:
    name: unlockit_network
    driver: bridge