<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link id="favicon" rel="icon" href="">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UnlockIt</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  <script>
    const favicon = document.getElementById("favicon");

    const svgBase = `
    <svg width="45" height="62" viewBox="0 0 45 62" xmlns="http://www.w3.org/2000/svg">
      <path fill="currentColor" d="M22 0C36.4 0 40 13 40 16.5V24.5C38 24.6667 34 23.5 34 22C34 17.5 34 6.5 22 6.5C11.5002 6.5 10.0001 15.4997 10 18.9297V27.5C13.515 26.8471 17.6741 26 22 26C33.6 26 44.5 29.5 44.5 31.5V56C44.5 58 35.6 62 22 62C8.4 62 0 58 0 56V31.5C0 30.5501 1.50165 29.5283 4 28.626V17.5C4 13.5 7.6 0 22 0ZM16 51C14.8954 52.1046 14.5 54.5 14.5 54.5H29.5C29.5 54.5 29.1046 52.1046 28 51C27 50 17 50 16 51ZM22 33.5C19.5147 33.5 17.5 35.5147 17.5 38C17.5 39.9591 18.7525 41.6243 20.5 42.2422V47.5C20.5 47.5 19.5523 47.4477 19 48C18.4477 48.5523 18.5 49.5 18.5 49.5C18.5 49.5 20.6332 49.5 22 49.5C23.3668 49.5 25.5 49.5 25.5 49.5C25.5 49.5 25.5523 48.5523 25 48C24.4477 47.4477 23.5 47.5 23.5 47.5V42.2422C25.2475 41.6243 26.5 39.9591 26.5 38C26.5 35.5147 24.4853 33.5 22 33.5Z"/>
    </svg>
    `.trim();

    const matcher = window.matchMedia("(prefers-color-scheme: dark)");

    function setFavicon() {
      const color = matcher.matches ? "white" : "black";

      const svgColored = svgBase.replace(
      "<svg ",
      `<svg color="${color}" `
      );

      const url = "data:image/svg+xml," + encodeURIComponent(svgColored);
      favicon.setAttribute("href", url);
    }

    matcher.addEventListener("change", setFavicon);
    setFavicon();
  </script>
</html>
